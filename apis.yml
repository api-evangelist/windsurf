aid: windsurf
url: https://raw.githubusercontent.com/api-evangelist/windsurf/refs/heads/main/apis.yml
name: Windsurf
kind: company
description: >-
  Windsurf (formerly Codeium) is the AI-native code editor and plugin family from the
  Codeium team, featuring Cascade - an agentic chatbot that collaborates with the user
  across files. Built on a VS Code base with proprietary inference, MCP server support,
  Devin Cloud sessions, and the SWE-1.5 fast agent model. Plans range from Free / Light /
  Pro / Max / Teams / Enterprise. No public REST API for application developers.
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
tags:
  - AI
  - Developer Tools
  - Code Editor
  - Agent
  - Cascade
  - IDE
  - MCP
created: '2026-05-08'
modified: '2026-05-08'
specificationVersion: '0.19'
apis:
  - aid: windsurf:editor
    name: Windsurf Editor
    description: >-
      Standalone AI-native IDE forked from VS Code featuring Cascade agent, autocomplete
      (Fill-In-The-Middle), Chat, Command, MCP server integration, and Devin Cloud
      sessions for background development. SWE-1.5 fast agent model included.
    image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
    humanURL: https://windsurf.com/editor
    baseURL: https://windsurf.com
