        url: https://windsurf.com/editor
      - type: Documentation
        url: https://docs.windsurf.com/
  - aid: windsurf:plugins
    name: Windsurf Plugins
    description: >-
      VS Code, JetBrains, Vim, Emacs, Visual Studio, Sublime Text plugins. Surface
